<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NC Thinner clear liquid in laboratory beaker</title>
  <desc id="desc">A grey studio product image showing a glass beaker with clear NC Thinner liquid.</desc>
  <defs>
